# File: params.yaml
# Purpose: Training and data configuration

data:
  raw_path: data/raw/twitter_hate_speech.csv
  train_path: data/processed/train.csv
  test_path: data/processed/test.csv
  text_col: tweet
  label_col: label
  test_size: 0.2
  random_seed: 42

train:
  model_name: bert-base-uncased
  max_length: 128
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  learning_rate: 2e-5
  num_train_epochs: 2
  weight_decay: 0.01
  warmup_ratio: 0.06
  eval_strategy: epoch
  save_strategy: epoch
  metric_for_best_model: f1
  greater_is_better: true

mlflow:
  experiment_name: hatespeech-bert
  tracking_uri: ""

artifacts:
  model_dir: models/bert
  metrics_path: metrics.json
